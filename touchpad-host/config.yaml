name: AirTouch 4 Touchpad Host
version: "0.1.9"
slug: airtouch4_touchpad_host
description: Python host for the AirTouch 4 internal RS485 touchpad protocol.
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: manual
stage: experimental
init: false
panel_admin: true
watchdog: http://[HOST]:[PORT:8099]/api/health
ingress: true
ingress_port: 8099
panel_icon: mdi:thermostat
panel_title: AirTouch 4
uart: true
homeassistant_api: true
ports:
  8099/tcp: null
ports_description:
  8099/tcp: Optional direct HTTP/WebSocket API port. Ingress does not require this to be exposed.
options:
  transport: tcp_serial
  serial_port: /dev/ttyUSB0
  baudrate: 115200
  tcp_host: 192.168.30.56
  tcp_port: 6638
  reconnect_interval: 5.0
  source_address: auto
  force_source_address: false
  detect_seconds: 3.0
  heartbeat_interval: 30.0
  touchpad_temperature_sensor: ""
  touchpad_temperature: 25.0
  heartbeat_payload: ""
  bus_log: false
  log_level: info
schema:
  transport: list(local_serial|tcp_serial)
  serial_port: str
  baudrate: int
  tcp_host: str
  tcp_port: int
  reconnect_interval: float
  source_address: list(auto|0x90|0x91)
  force_source_address: bool
  detect_seconds: float
  heartbeat_interval: float
  touchpad_temperature_sensor: str
  touchpad_temperature: float
  heartbeat_payload: str
  bus_log: bool
  log_level: list(debug|info|warning|error)
