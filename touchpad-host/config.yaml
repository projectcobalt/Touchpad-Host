name: OpenAirtouch
version: "0.2.3"
slug: airtouch4_touchpad_host
description: Python host for the AirTouch internal RS485 touchpad protocol.
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: manual
stage: experimental
init: false
panel_admin: true
watchdog: http://[HOST]:[PORT:8099]/api/health
ingress: true
ingress_port: 8099
panel_icon: mdi:thermostat
panel_title: OpenAirtouch
uart: true
homeassistant_api: true
services:
  - mqtt:need
ports:
  8099/tcp: null
ports_description:
  8099/tcp: Optional direct HTTP/WebSocket API port. Ingress does not require this to be exposed.
options:
  transport: tcp_serial
  serial_port: /dev/ttyUSB0
  baudrate: 115200
  tcp_host: 192.168.30.56
  tcp_port: 6638
  reconnect_interval: 5.0
  protocol: auto
  source_address: auto
  force_source_address: false
  detect_seconds: 3.0
  heartbeat_interval: 30.0
  touchpad_temperature_sensor: ""
  touchpad_temperature: 25.0
  heartbeat_payload: ""
  bus_log: false
  weather_entity: ""
  forecast_weather_entity: ""
  indoor_temperature_entity: ""
  indoor_humidity_entity: ""
  solar_irradiance_entity: ""
  cloud_cover_entity: ""
  weather_poll_interval: 60.0
  mqtt_enabled: true
  mqtt_host: ""
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_discovery: true
  mqtt_discovery_prefix: homeassistant
  mqtt_topic_prefix: airtouch4
  mqtt_publish_interval: 10.0
  remote_error_resolution: false
  remote_error_cache_days: 2.0
  remote_error_device_id: ""
  remote_error_serial: ""
  log_level: info
schema:
  transport: list(local_serial|tcp_serial)
  serial_port: str
  baudrate: int
  tcp_host: str
  tcp_port: int
  reconnect_interval: float
  protocol: list(auto|at4|at5)
  source_address: list(auto|0x90|0x91)
  force_source_address: bool
  detect_seconds: float
  heartbeat_interval: float
  touchpad_temperature_sensor: str
  touchpad_temperature: float
  heartbeat_payload: str
  bus_log: bool
  weather_entity: str
  forecast_weather_entity: str
  indoor_temperature_entity: str
  indoor_humidity_entity: str
  solar_irradiance_entity: str
  cloud_cover_entity: str
  weather_poll_interval: float
  mqtt_enabled: bool
  mqtt_host: str
  mqtt_port: int
  mqtt_username: str
  mqtt_password: password
  mqtt_discovery: bool
  mqtt_discovery_prefix: str
  mqtt_topic_prefix: str
  mqtt_publish_interval: float
  remote_error_resolution: bool
  remote_error_cache_days: float
  remote_error_device_id: str
  remote_error_serial: str
  log_level: list(debug|info|warning|error)
